services:
      changedetection:
            image: ghcr.io/bscout9956/markovbot:main
            container_name: markovbot

            # It is recommended that you set the user that the container is running as to the same as the "host"
            # because this will allow you to make changes to any files generated by the app (if it ever does so)
            # without permission issues, and avoids issues with reading messages.txt
            #user: "1001:1001"

            volumes:
                  # NOTE: If you are using a container manager like Portainer you MUST hardcode your paths if you want
                  # access to your files in a specific directory that's not inside Portainer's data path
                  - ./data:/markovbot/data
                  - ./logs:/markovbot/logs

                  # This technically allows you to make changes to the Python code and simply restart the container,
                  # because the mount is overwriting what was built in the image with the local directory. Think of
                  # it as a developer/test mode.
                  # - /home/dockeruser/containers/markovbot:/markovbot/ 

            environment:
                  #- PUID=1001
                  #- PGID=1001

                  # Don't forget to set your tokens here, or in an env file.
                  - MARKOVBOT_TOKEN=
                  - MARKOVBOT_CHANNEL_ID=
            # env_file: .env

            restart: unless-stopped