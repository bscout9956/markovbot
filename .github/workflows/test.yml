on:
    push:
        branches:
            - "**"

name: PyTest Testing
jobs:
    test:
        name: Testing for Markovbot
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@master
            - uses: actions/setup-python@v4
              with:
                  python-version: '3.14'
            - name: Install dependencies
              run: uv sync
            - name: Run tests
              run: uv run pytest tests.py -v